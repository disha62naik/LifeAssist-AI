<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}LifeAssist AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% if session.get('user') %}
  <nav class="navbar">
    <a href="{{ url_for('dashboard') }}" class="nav-brand">
      <span class="brand-icon">⚡</span> LifeAssist <span class="brand-ai">AI</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('tasks') }}" class="{% if request.endpoint == 'tasks' %}active{% endif %}">Tasks</a>
      <a href="{{ url_for('decision') }}" class="{% if request.endpoint == 'decision' %}active{% endif %}">Decide</a>
      <a href="{{ url_for('planner') }}" class="{% if request.endpoint == 'planner' %}active{% endif %}">Planner</a>
      <a href="{{ url_for('productivity') }}" class="{% if request.endpoint == 'productivity' %}active{% endif %}">Productivity</a>
      <a href="{{ url_for('logout') }}" class="nav-logout">Logout</a>
    </div>
  </nav>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
